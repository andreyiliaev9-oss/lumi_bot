version: '3.8'
services:
  lumi-bot:
    build: .
    container_name: lumi-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:///data/lumi_bot.db
